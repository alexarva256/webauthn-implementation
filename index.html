<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>YubiKey WebAuthn - IndexedDB</title>
    <style>
        body { font-family: sans-serif; background: #111827; color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { display: flex; gap: 20px; max-width: 900px; width: 100%; padding: 20px; flex-wrap: wrap; }
        .box { background: #1f2937; padding: 30px; border-radius: 10px; flex: 1; display: flex; flex-direction: column; box-shadow: 0 4px 6px rgba(0,0,0,0.3); min-width: 300px; }
        h2 { margin-top: 0; color: #f3f4f6; font-size: 1.2rem; border-bottom: 1px solid #374151; padding-bottom: 10px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #374151; background: #0f172a; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: background 0.2s; color: white;}
        .btn-register { background: #2563eb; } .btn-register:hover { background: #1d4ed8; }
        .btn-login { background: #10b981; margin-bottom: 20px; } .btn-login:hover { background: #059669; }
        pre { margin-top: 20px; background: #0f172a; padding: 15px; border-radius: 8px; font-size: 12px; color: #10b981; white-space: pre-wrap; word-wrap: break-word; flex-grow: 1; overflow-x: auto; }
    </style>
    <!-- browser-compatible CBOR library -->
    <script src="https://unpkg.com/cbor-web/dist/cbor.js"></script>
</head>
<body>

<div class="container">
    <div class="box">
        <h2>1. Register New Key</h2>
        <input type="text" id="reg-username" placeholder="Enter a username...">
        <button class="btn-register" id="registerBtn">Register YubiKey</button>
        <pre id="reg-output">Awaiting registration...</pre>
    </div>

    <div class="box">
        <h2>2. Login (Discoverable Credential)</h2>
        <button class="btn-login" id="loginBtn">Authenticate</button>
        <pre id="login-output">Awaiting authentication...</pre>
    </div>
</div>

<script src="/app.js"></script>
</body>
</html>
